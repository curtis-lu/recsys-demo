<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 600" width="980" height="600">
  <style>text{font-family:-apple-system,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif}</style>
  <defs><marker id="a5" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#495057"/></marker></defs>
  <rect x="0" y="0" width="980" height="600" fill="#fdfdfb"/>

  <!-- source_etl -->
  <text x="350" y="70" text-anchor="end" font-size="11" fill="#495057">上游資料表</text>
  <line x1="352" y1="66" x2="378" y2="66" stroke="#495057" stroke-width="1.5" marker-end="url(#a5)"/>
  <rect x="380" y="34" width="240" height="66" rx="12" fill="#a5d8ff" stroke="#1971c2" stroke-width="1.5"/>
  <text x="500" y="54" text-anchor="middle" font-size="13" font-weight="bold">source_etl（SQL）</text>
  <text x="500" y="73" text-anchor="middle" font-size="10.5">3 子流程：feature_etl · label_etl</text>
  <text x="500" y="89" text-anchor="middle" font-size="10.5">· sample_pool_etl</text>
  <line x1="622" y1="66" x2="648" y2="66" stroke="#495057" stroke-width="1.5" marker-end="url(#a5)"/>
  <text x="652" y="62" font-size="11" fill="#495057">feature_table · label_table</text>
  <text x="652" y="76" font-size="11" fill="#495057">· sample_pool</text>
  <line x1="500" y1="100" x2="500" y2="134" stroke="#495057" stroke-width="1.5" marker-end="url(#a5)"/>

  <!-- dataset -->
  <text x="350" y="160" text-anchor="end" font-size="11" fill="#495057">feature_table · label_table</text>
  <text x="350" y="174" text-anchor="end" font-size="11" fill="#495057">· sample_pool</text>
  <line x1="352" y1="165" x2="378" y2="165" stroke="#495057" stroke-width="1.5" marker-end="url(#a5)"/>
  <rect x="380" y="138" width="240" height="54" rx="12" fill="#a5d8ff" stroke="#1971c2" stroke-width="1.5"/>
  <text x="500" y="160" text-anchor="middle" font-size="13" font-weight="bold">dataset</text>
  <text x="500" y="179" text-anchor="middle" font-size="11">抽樣 + 前處理 → 訓練輸入</text>
  <line x1="622" y1="165" x2="648" y2="165" stroke="#495057" stroke-width="1.5" marker-end="url(#a5)"/>
  <text x="652" y="161" font-size="11" fill="#495057">*_model_input</text>
  <text x="652" y="175" font-size="11" fill="#495057">（+ preprocessor · category_mappings）</text>
  <line x1="500" y1="192" x2="500" y2="226" stroke="#495057" stroke-width="1.5" marker-end="url(#a5)"/>

  <!-- training -->
  <text x="350" y="258" text-anchor="end" font-size="11" fill="#495057">*_model_input · preprocessor</text>
  <line x1="352" y1="259" x2="378" y2="259" stroke="#495057" stroke-width="1.5" marker-end="url(#a5)"/>
  <rect x="380" y="230" width="240" height="58" rx="12" fill="#a5d8ff" stroke="#1971c2" stroke-width="1.5"/>
  <text x="500" y="253" text-anchor="middle" font-size="13" font-weight="bold">training</text>
  <text x="500" y="272" text-anchor="middle" font-size="11">cache → 調參 → 訓練 → 機率校準</text>
  <line x1="622" y1="259" x2="648" y2="259" stroke="#495057" stroke-width="1.5" marker-end="url(#a5)"/>
  <text x="652" y="255" font-size="11" fill="#495057">model.txt</text>
  <text x="652" y="269" font-size="11" fill="#495057">· training_eval_predictions</text>

  <!-- fork -->
  <polyline points="430,288 430,360 210,360 210,452" fill="none" stroke="#495057" stroke-width="1.5" marker-end="url(#a5)"/>
  <text x="300" y="352" text-anchor="middle" font-size="10.5" fill="#1971c2">training_eval_predictions（--post-training）</text>
  <polyline points="560,288 560,330 770,330 770,360" fill="none" stroke="#495057" stroke-width="1.5" marker-end="url(#a5)"/>
  <text x="650" y="324" text-anchor="middle" font-size="10.5" fill="#1971c2">model.txt</text>

  <!-- inference -->
  <text x="636" y="392" text-anchor="end" font-size="10" fill="#868e96">+ feature_table</text>
  <text x="636" y="405" text-anchor="end" font-size="10" fill="#868e96">· preprocessor</text>
  <rect x="650" y="362" width="240" height="56" rx="12" fill="#a5d8ff" stroke="#1971c2" stroke-width="1.5"/>
  <text x="770" y="385" text-anchor="middle" font-size="13" font-weight="bold">inference</text>
  <text x="770" y="404" text-anchor="middle" font-size="11">評分 → 排名</text>
  <line x1="770" y1="418" x2="770" y2="452" stroke="#495057" stroke-width="1.5" marker-end="url(#a5)"/>
  <text x="778" y="440" font-size="10.5" fill="#1971c2">ranked_predictions</text>

  <!-- scenario titles -->
  <text x="210" y="446" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#e8590c">情境 1：post-training</text>
  <text x="770" y="446" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#e8590c">情境 2：inference 後監控</text>

  <!-- evaluation boxes -->
  <rect x="90" y="454" width="240" height="58" rx="12" fill="#ffd8a8" stroke="#e8590c" stroke-width="1.5"/>
  <text x="210" y="477" text-anchor="middle" font-size="13" font-weight="bold">evaluation</text>
  <text x="210" y="496" text-anchor="middle" font-size="11">算排序指標 → 產報表</text>
  <text x="210" y="532" text-anchor="middle" font-size="10.5" fill="#495057">report.html · enriched_eval_predictions</text>

  <rect x="650" y="454" width="240" height="58" rx="12" fill="#ffd8a8" stroke="#e8590c" stroke-width="1.5"/>
  <text x="770" y="477" text-anchor="middle" font-size="13" font-weight="bold">evaluation</text>
  <text x="770" y="496" text-anchor="middle" font-size="11">算排序指標 → 產報表</text>
  <text x="770" y="532" text-anchor="middle" font-size="10.5" fill="#495057">report.html · enriched_eval_predictions</text>
</svg>
