# Local dev overrides - paths relative to project root
feature_table:
  type: ParquetDataset
  filepath: data/feature_table.parquet
  backend: pandas

label_table:
  type: ParquetDataset
  filepath: data/label_table.parquet
  backend: pandas

# Dataset Building Pipeline - Intermediate Outputs
sample_keys:
  type: ParquetDataset
  filepath: data/dataset/${dataset_version}/sample_keys.parquet
  backend: pandas

train_keys:
  type: ParquetDataset
  filepath: data/dataset/${dataset_version}/train_keys.parquet
  backend: pandas

train_dev_keys:
  type: ParquetDataset
  filepath: data/dataset/${dataset_version}/train_dev_keys.parquet
  backend: pandas

val_keys:
  type: ParquetDataset
  filepath: data/dataset/${dataset_version}/val_keys.parquet
  backend: pandas

train_set:
  type: ParquetDataset
  filepath: data/dataset/${dataset_version}/train_set.parquet
  backend: pandas

train_dev_set:
  type: ParquetDataset
  filepath: data/dataset/${dataset_version}/train_dev_set.parquet
  backend: pandas

val_set:
  type: ParquetDataset
  filepath: data/dataset/${dataset_version}/val_set.parquet
  backend: pandas

X_train:
  type: PickleDataset
  filepath: data/dataset/${dataset_version}/X_train.pkl

y_train:
  type: PickleDataset
  filepath: data/dataset/${dataset_version}/y_train.pkl

X_train_dev:
  type: PickleDataset
  filepath: data/dataset/${dataset_version}/X_train_dev.pkl

