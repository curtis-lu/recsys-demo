  type: PickleDataset
  filepath: data/dataset/${dataset_version}/y_train_dev.pkl

X_val:
  type: PickleDataset
  filepath: data/dataset/${dataset_version}/X_val.pkl

y_val:
  type: PickleDataset
  filepath: data/dataset/${dataset_version}/y_val.pkl

model:
  type: PickleDataset
  filepath: data/models/${model_version}/model.pkl

best_params:
  type: JSONDataset
  filepath: data/models/${model_version}/best_params.json

evaluation_results:
  type: JSONDataset
  filepath: data/models/${model_version}/evaluation_results.json

preprocessor:
  type: PickleDataset
  filepath: data/dataset/${dataset_version}/preprocessor.pkl

category_mappings:
  type: JSONDataset
  filepath: data/dataset/${dataset_version}/category_mappings.json
