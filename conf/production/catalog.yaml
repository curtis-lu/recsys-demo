# Production overrides - Spark backend, Hive tables on HDFS.
# Three-layer versioning: base_dataset_version keys invariant artifacts;
# train_variant_id keys per-train-sampling artifacts; calibration_variant_id
# keys per-calibration-sampling artifacts. Each layer lives under a different
# HDFS path (base / train_variants / calibration_variants) and table names
# carry the corresponding version suffixes.

# --- Source tables (read-only, managed by source_etl) ---
feature_table:
  type: HiveTableDataset
  database: ${hive.db}
  table: feature_table
  read_only: true

label_table:
  type: HiveTableDataset
  database: ${hive.db}
  table: label_table
  read_only: true

# --- Dataset base layer (per base_dataset_version) ---
val_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: val_keys_${base_dataset_version}
  external: true
  location: hdfs:///data/recsys/dataset/${base_dataset_version}/val_keys
  columns: "auto"

test_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: test_keys_${base_dataset_version}
  external: true
  location: hdfs:///data/recsys/dataset/${base_dataset_version}/test_keys
  columns: "auto"

val_model_input:
  type: HiveTableDataset
  database: ${hive.db}
  table: val_model_input_${base_dataset_version}
  external: true
  location: hdfs:///data/recsys/dataset/${base_dataset_version}/val_model_input
  columns: "auto"

test_model_input:
  type: HiveTableDataset
  database: ${hive.db}
  table: test_model_input_${base_dataset_version}
  external: true
  location: hdfs:///data/recsys/dataset/${base_dataset_version}/test_model_input
  columns: "auto"

preprocessor:
  type: PickleDataset
  filepath: hdfs:///data/recsys/dataset/${base_dataset_version}/preprocessor.pkl

category_mappings:
  type: JSONDataset
  filepath: hdfs:///data/recsys/dataset/${base_dataset_version}/category_mappings.json

# --- Dataset train-variant layer (per base + train_variant) ---
sample_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: sample_keys_${base_dataset_version}_${train_variant_id}
  external: true
  location: hdfs:///data/recsys/dataset/${base_dataset_version}/train_variants/${train_variant_id}/sample_keys
  columns: "auto"
  partition_cols:
    - {name: snap_date, type: STRING}

train_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: train_keys_${base_dataset_version}_${train_variant_id}
  external: true
  location: hdfs:///data/recsys/dataset/${base_dataset_version}/train_variants/${train_variant_id}/train_keys
  columns: "auto"

train_dev_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: train_dev_keys_${base_dataset_version}_${train_variant_id}
  external: true
  location: hdfs:///data/recsys/dataset/${base_dataset_version}/train_variants/${train_variant_id}/train_dev_keys
  columns: "auto"

train_model_input:
  type: HiveTableDataset
  database: ${hive.db}
  table: train_model_input_${base_dataset_version}_${train_variant_id}
  external: true
  location: hdfs:///data/recsys/dataset/${base_dataset_version}/train_variants/${train_variant_id}/train_model_input
  columns: "auto"

train_dev_model_input:
  type: HiveTableDataset
  database: ${hive.db}
  table: train_dev_model_input_${base_dataset_version}_${train_variant_id}
  external: true
  location: hdfs:///data/recsys/dataset/${base_dataset_version}/train_variants/${train_variant_id}/train_dev_model_input
  columns: "auto"

# --- Dataset calibration-variant layer (per base + calibration_variant) ---
calibration_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: calibration_keys_${base_dataset_version}_${calibration_variant_id}
  external: true
  location: hdfs:///data/recsys/dataset/${base_dataset_version}/calibration_variants/${calibration_variant_id}/calibration_keys
  columns: "auto"

calibration_model_input:
  type: HiveTableDataset
  database: ${hive.db}
  table: calibration_model_input_${base_dataset_version}_${calibration_variant_id}
  external: true
  location: hdfs:///data/recsys/dataset/${base_dataset_version}/calibration_variants/${calibration_variant_id}/calibration_model_input
  columns: "auto"

# --- Training Pipeline - Binary / non-DataFrame artifacts (not Hive) ---
model:
  type: ModelAdapterDataset
  filepath: hdfs:///data/recsys/models/${model_version}/model.txt

best_params:
  type: JSONDataset
  filepath: hdfs:///data/recsys/models/${model_version}/best_params.json

evaluation_results:
  type: JSONDataset
  filepath: hdfs:///data/recsys/models/${model_version}/evaluation_results.json

# --- Inference Pipeline - Hive EXTERNAL TABLE with dynamic partition overwrite ---
# Each run only overwrites partitions present in the DataFrame (snap_date x prod_name x model_version).
score_table:
  type: HiveTableDataset
  database: ${hive.db}
  table: score_table
  external: true
  location: hdfs:///data/recsys/inference/score_table
  columns:
    - {name: cust_id, type: STRING}
    - {name: score, type: DOUBLE}
  partition_cols:
    - {name: snap_date, type: STRING}
    - {name: prod_name, type: STRING}
    - {name: model_version, type: STRING}

validated_predictions:
  type: HiveTableDataset
  database: ${hive.db}
  table: ranked_predictions
  external: true
  location: hdfs:///data/recsys/inference/ranked_predictions
  columns:
    - {name: cust_id, type: STRING}
    - {name: score, type: DOUBLE}
    - {name: rank, type: BIGINT}
  partition_cols:
    - {name: snap_date, type: STRING}
    - {name: prod_name, type: STRING}
    - {name: model_version, type: STRING}
