# Production overrides - Spark backend, HDFS paths

# Dataset Building Pipeline - Source Tables
feature_table:
  type: ParquetDataset
  filepath: hdfs:///data/recsys/feature_table.parquet
  backend: spark

label_table:
  type: ParquetDataset
  filepath: hdfs:///data/recsys/label_table.parquet
  backend: spark

# Dataset Building Pipeline - Intermediate Outputs
sample_keys:
  type: ParquetDataset
  filepath: hdfs:///data/recsys/dataset/${dataset_version}/sample_keys.parquet
  backend: spark

train_keys:
  type: ParquetDataset
  filepath: hdfs:///data/recsys/dataset/${dataset_version}/train_keys.parquet
  backend: spark

train_dev_keys:
  type: ParquetDataset
  filepath: hdfs:///data/recsys/dataset/${dataset_version}/train_dev_keys.parquet
  backend: spark

val_keys:
  type: ParquetDataset
  filepath: hdfs:///data/recsys/dataset/${dataset_version}/val_keys.parquet
  backend: spark

train_set:
  type: ParquetDataset
  filepath: hdfs:///data/recsys/dataset/${dataset_version}/train_set.parquet
  backend: spark

train_dev_set:
  type: ParquetDataset
  filepath: hdfs:///data/recsys/dataset/${dataset_version}/train_dev_set.parquet
  backend: spark

val_set:
  type: ParquetDataset
  filepath: hdfs:///data/recsys/dataset/${dataset_version}/val_set.parquet
  backend: spark

X_train:
  type: ParquetDataset
  filepath: hdfs:///data/recsys/dataset/${dataset_version}/X_train.parquet
  backend: pandas

y_train:
  type: ParquetDataset
  filepath: hdfs:///data/recsys/dataset/${dataset_version}/y_train.parquet
  backend: pandas

X_train_dev:
  type: ParquetDataset
  filepath: hdfs:///data/recsys/dataset/${dataset_version}/X_train_dev.parquet
  backend: pandas

y_train_dev:
  type: ParquetDataset
  filepath: hdfs:///data/recsys/dataset/${dataset_version}/y_train_dev.parquet
  backend: pandas

X_val:
  type: ParquetDataset
  filepath: hdfs:///data/recsys/dataset/${dataset_version}/X_val.parquet
  backend: pandas

y_val:
  type: ParquetDataset
  filepath: hdfs:///data/recsys/dataset/${dataset_version}/y_val.parquet
  backend: pandas

# Training Pipeline
model:
  type: LightGBMDataset
  filepath: hdfs:///data/recsys/models/${model_version}/model.txt

best_params:
  type: JSONDataset
  filepath: hdfs:///data/recsys/models/${model_version}/best_params.json

evaluation_results:
  type: JSONDataset
  filepath: hdfs:///data/recsys/models/${model_version}/evaluation_results.json

preprocessor:
  type: PickleDataset
  filepath: hdfs:///data/recsys/dataset/${dataset_version}/preprocessor.pkl

category_mappings:
  type: JSONDataset
  filepath: hdfs:///data/recsys/dataset/${dataset_version}/category_mappings.json

# Inference Pipeline - Partitioned Outputs
score_table:
  type: ParquetDataset
  filepath: hdfs:///data/recsys/inference/score_table
  backend: spark
  partition_cols: [snap_date, prod_name, model_version]

validated_predictions:
  type: ParquetDataset
  filepath: hdfs:///data/recsys/inference/ranked_predictions
  backend: spark
  partition_cols: [snap_date, prod_name, model_version]
