# Sample pool ETL pipeline 配置
# 上游依賴 feature_etl 產出的 feature_concat 與 label_etl 產出的
# label_{ccard,exchange,fund}。未來如需做跨 DAG 新鮮度檢查，可加在
# ${target_db}.feature_concat 與三張 label table 的 source_checks。

sample_pool_etl:
  dry_run: false   # bool；★此檔設 false 故 local 也實寫表（feature/label 未設→local 預設 dry-run，見 docs/pipelines/source_etl.md）
  variables:
    target_db: "ml_recsys"

  # 上游 source table 的新鮮度 / schema 檢查（ETL 執行前先跑）
  source_checks: {}

  # Output tables — 執行順序 = list 順序
  tables:
    - name: sample_pool
      sql_file: sample_pool/sample_pool.sql
      partition_by:
        snap_date: DATE
      primary_key: [snap_date, cust_id, prod_name]
      quality_checks:
        max_duplicate_key_ratio: 0.0

  # Audit Hive table（feature/label/sample_pool ETL 共用）
  audit:
    database: "${target_db}"
    table: etl_audit_log
