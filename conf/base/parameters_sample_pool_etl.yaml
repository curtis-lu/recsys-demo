# Sample Pool ETL Pipeline Configuration
# Depends on feature_concat and label_{ccard,exchange,fund} produced by feature_etl
# and label_etl respectively. Cross-DAG freshness can be enforced later via
# source_checks on ${target_db}.feature_concat and the three label tables.

sample_pool_etl:
  variables:
    target_db: "ml_feature"

  # Source table freshness and schema checks (run before ETL execution)
  source_checks: {}

  # Output tables — execution order = list order
  tables:
    - name: sample_pool
      sql_file: sample_pool/sample_pool.sql
      partition_by:
        snap_date: DATE
      primary_key: [snap_date, cust_id, prod_name]
      quality_checks:
        max_duplicate_key_ratio: 0.0

  # Audit Hive table (shared across feature/label/sample_pool ETL)
  audit:
    database: "${target_db}"
    table: etl_audit_log
