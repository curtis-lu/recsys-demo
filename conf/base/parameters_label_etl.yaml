# Label ETL pipeline 配置
# tables 依 list 順序執行；depends_on 僅作為文件與順序驗證用，不會改變執行順序。

label_etl:
  variables:
    target_db: "ml_recsys"

  # 上游 source table 的新鮮度 / schema 檢查（ETL 執行前先跑）
  source_checks: {}

  # Output tables — 執行順序 = list 順序
  tables:
    - name: label_ccard
      sql_file: label/label_ccard.sql
      partition_by:
        prod_name: STRING
        snap_date: DATE
      primary_key: [snap_date, cust_id, prod_name]
      quality_checks:
        max_duplicate_key_ratio: 0.0

    - name: label_exchange
      sql_file: label/label_exchange.sql
      partition_by:
        prod_name: STRING
        snap_date: DATE
      primary_key: [snap_date, cust_id, prod_name]
      quality_checks:
        max_duplicate_key_ratio: 0.0

    - name: label_fund
      sql_file: label/label_fund.sql
      partition_by:
        prod_name: STRING
        snap_date: DATE
      primary_key: [snap_date, cust_id, prod_name]
      quality_checks:
        max_duplicate_key_ratio: 0.0

    - name: label_table
      sql_file: label/label_table.sql
      partition_by:
        prod_name: STRING
        snap_date: DATE
      primary_key: [snap_date, cust_id, prod_name]
      depends_on: [label_ccard, label_exchange, label_fund]
      quality_checks:
        max_duplicate_key_ratio: 0.0

  # Audit Hive table（feature/label/sample_pool ETL 共用）
  audit:
    database: "${target_db}"
    table: etl_audit_log
