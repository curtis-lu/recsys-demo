# Feature ETL Pipeline Configuration
# Tables are executed in list order. depends_on is for documentation and order validation only.

feature_etl:
  variables:
    target_db: "ml_recsys"

  # Source table freshness and schema checks (run before ETL execution)
  source_checks: {}

  # Output tables — execution order = list order
  tables:
    - name: feature_aum
      sql_file: feature/feature_aum.sql
      partition_by:
        snap_date: DATE
      primary_key: [snap_date, cust_id]

    - name: feature_sav
      sql_file: feature/feature_sav.sql
      partition_by:
        snap_date: DATE
      primary_key: [snap_date, cust_id]

    - name: feature_ccard
      sql_file: feature/feature_ccard.sql
      partition_by:
        snap_date: DATE
      primary_key: [snap_date, cust_id]

    - name: feature_info
      sql_file: feature/feature_info.sql
      partition_by:
        snap_date: DATE
      primary_key: [snap_date, cust_id]

    - name: feature_concat
      sql_file: feature/feature_concat.sql
      partition_by:
        snap_date: DATE
      primary_key: [snap_date, cust_id]
      depends_on: [feature_aum, feature_sav, feature_ccard, feature_info]

    - name: feature_table
      sql_file: feature/feature_table.sql
      partition_by:
        snap_date: DATE
      primary_key: [snap_date, cust_id]
      depends_on: [feature_concat]

  # Audit Hive table (shared across feature/label/sample_pool ETL)
  audit:
    database: "${target_db}"
    table: etl_audit_log
