# Feature ETL pipeline 配置
# tables 依 list 順序執行；depends_on 僅作為文件與順序驗證用，不會改變執行順序。

feature_etl:
  variables:
    target_db: "ml_recsys"

  # 上游 source table 的新鮮度 / schema 檢查（ETL 執行前先跑）
  source_checks: {}

  # Output tables — 執行順序 = list 順序
  tables:
    - name: feature_aum
      sql_file: feature/feature_aum.sql
      partition_by:
        snap_date: DATE
      primary_key: [snap_date, cust_id]

    - name: feature_sav
      sql_file: feature/feature_sav.sql
      partition_by:
        snap_date: DATE
      primary_key: [snap_date, cust_id]

    - name: feature_ccard
      sql_file: feature/feature_ccard.sql
      partition_by:
        snap_date: DATE
      primary_key: [snap_date, cust_id]

    - name: feature_info
      sql_file: feature/feature_info.sql
      partition_by:
        snap_date: DATE
      primary_key: [snap_date, cust_id]

    - name: feature_concat
      sql_file: feature/feature_concat.sql
      partition_by:
        snap_date: DATE
      primary_key: [snap_date, cust_id]
      depends_on: [feature_aum, feature_sav, feature_ccard, feature_info]

    - name: feature_table
      sql_file: feature/feature_table.sql
      partition_by:
        snap_date: DATE
      primary_key: [snap_date, cust_id]
      depends_on: [feature_concat]

  # Audit Hive table（feature/label/sample_pool ETL 共用）
  audit:
    database: "${target_db}"
    table: etl_audit_log
