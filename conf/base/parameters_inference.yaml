spark:
  app_name: recsys_tfb-inference
  spark.executor.memory: 24g
  spark.executor.cores: 4
  spark.sql.shuffle.partitions: 400

inference:
  use_calibration: true
  snap_dates:
    - "2025-12-31"
  products:
    - "exchange_usd"
    - "exchange_fx"
    - "fund_stock"
    - "fund_bond"
    - "fund_mix"
    - "ccard_ins"
    - "ccard_bill"
    - "ccard_cash"
