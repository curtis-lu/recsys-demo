# Production overrides - Hive tables on HDFS.
# Three-layer versioning: base_dataset_version keys invariant artifacts;
# train_variant_id keys per-train-sampling artifacts; calibration_variant_id
# keys per-calibration-sampling artifacts. Each layer lives under a different
# HDFS path (base / train_variants / calibration_variants) and table names
# carry the corresponding version suffixes.

# --- Source tables (read-only, managed by source_etl) ---
feature_table:
  type: HiveTableDataset
  database: ${hive.db}
  table: feature_table
  read_only: true

label_table:
  type: HiveTableDataset
  database: ${hive.db}
  table: label_table
  read_only: true

sample_pool:
  type: HiveTableDataset
  database: ${hive.db}
  table: sample_pool
  read_only: true

# --- Dataset base layer (per base_dataset_version) ---
# Single Hive table per logical artifact; base_dataset_version is the outer
# partition column. snap_date is the inner dynamic partition.
val_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: recsys_prod_val_keys
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
  partition_cols:
    - {name: snap_date, type: STRING}

test_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: recsys_prod_test_keys
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
  partition_cols:
    - {name: snap_date, type: STRING}

val_model_input:
  type: HiveTableDataset
  database: ${hive.db}
  table: recsys_prod_val_model_input
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
  partition_cols:
    - {name: snap_date, type: STRING}

test_model_input:
  type: HiveTableDataset
  database: ${hive.db}
  table: recsys_prod_test_model_input
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
  partition_cols:
    - {name: snap_date, type: STRING}

preprocessor:
  type: JSONDataset
  filepath: data/dataset/${base_dataset_version}/preprocessor.json

category_mappings:
  type: JSONDataset
  filepath: data/dataset/${base_dataset_version}/category_mappings.json

# --- Dataset train-variant layer (per base + train_variant) ---
sample_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: recsys_prod_sample_keys
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
    train_variant_id: ${train_variant_id}
  partition_cols:
    - {name: snap_date, type: STRING}

train_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: recsys_prod_train_keys
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
    train_variant_id: ${train_variant_id}
  partition_cols:
    - {name: snap_date, type: STRING}

train_dev_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: recsys_prod_train_dev_keys
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
    train_variant_id: ${train_variant_id}
  partition_cols:
    - {name: snap_date, type: STRING}

preprocessed_feature_table:
    type: HiveTableDataset
    database: ${hive.db}
    table: recsys_prod_preprocessed_feature_table
    external: false
    columns: "auto"
    partition_filter:
      base_dataset_version: ${base_dataset_version}
    partition_cols:
      - {name: snap_date, type: STRING}

train_model_input:
  type: HiveTableDataset
  database: ${hive.db}
  table: recsys_prod_train_model_input
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
    train_variant_id: ${train_variant_id}
  partition_cols:
    - {name: snap_date, type: STRING}

train_dev_model_input:
  type: HiveTableDataset
  database: ${hive.db}
  table: recsys_prod_train_dev_model_input
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
    train_variant_id: ${train_variant_id}
  partition_cols:
    - {name: snap_date, type: STRING}

# --- Dataset calibration-variant layer (per base + calibration_variant) ---
calibration_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: recsys_prod_calibration_keys
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
    calibration_variant_id: ${calibration_variant_id}
  partition_cols:
    - {name: snap_date, type: STRING}

calibration_model_input:
  type: HiveTableDataset
  database: ${hive.db}
  table: recsys_prod_calibration_model_input
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
    calibration_variant_id: ${calibration_variant_id}
  partition_cols:
    - {name: snap_date, type: STRING}

# --- Training Pipeline - Binary / non-DataFrame artifacts (driver-local) ---
# ModelAdapterDataset / JSONDataset 用 Python 內建 open() 寫檔，不認 hdfs:// scheme，
# 因此寫到本機 host fs（與 cached_* 同一原則）。
model:
  type: ModelAdapterDataset
  filepath: data/models/${model_version}/model.txt

best_params:
  type: JSONDataset
  filepath: data/models/${model_version}/best_params.json

evaluation_results:
  type: JSONDataset
  filepath: data/models/${model_version}/evaluation_results.json

# Note: training cache 由 training/nodes.py::_materialize_parquet_handle
# 直接從 Hive table location `copyToLocal` 搬到 driver-local parquet，不經
# catalog 持久化；cache node outputs（ParquetHandle）走 framework
# auto-MemoryDataset 在 DAG 中銜接。
# See docs/superpowers/specs/2026-05-07-training-cache-hdfs-copy-design.md

# --- Inference Pipeline - Hive managed table with dynamic partition overwrite ---
# Each run only overwrites partitions present in the DataFrame (snap_date x prod_name x model_version).
score_table:
  type: HiveTableDataset
  database: ${hive.db}
  table: score_table
  external: false
  columns:
    - {name: cust_id, type: STRING}
    - {name: score, type: DOUBLE}
  partition_cols:
    - {name: snap_date, type: STRING}
    - {name: prod_name, type: STRING}
    - {name: model_version, type: STRING}

validated_predictions:
  type: HiveTableDataset
  database: ${hive.db}
  table: ranked_predictions
  external: false
  columns:
    - {name: cust_id, type: STRING}
    - {name: score, type: DOUBLE}
    - {name: rank, type: BIGINT}
  partition_cols:
    - {name: snap_date, type: STRING}
    - {name: prod_name, type: STRING}
    - {name: model_version, type: STRING}

# --- Inference Pipeline (cont.) - Evaluation read-side entry ---
# Same Hive table as validated_predictions; declared separately so evaluation
# pipeline can run standalone (without inference in same session).
# core/catalog.py:71 auto-fallbacks unknown names to MemoryDataset, which
# silently breaks standalone evaluation reads — this entry fixes that.
ranked_predictions:
  type: HiveTableDataset
  database: ${hive.db}
  table: ranked_predictions
  external: false
  columns:
    - {name: cust_id, type: STRING}
    - {name: score, type: DOUBLE}
    - {name: rank, type: BIGINT}
  partition_cols:
    - {name: snap_date, type: STRING}
    - {name: prod_name, type: STRING}
    - {name: model_version, type: STRING}

# --- Training Pipeline - Test-set predictions for downstream evaluation reuse ---
# Written by training/nodes.py::write_test_predictions per prod_name (bypasses catalog
# auto-save for memory control). Read by evaluation pipeline when --post-training.
training_eval_predictions:
  type: HiveTableDataset
  database: ${hive.db}
  table: training_eval_predictions
  external: false
  columns:
    - {name: cust_id, type: STRING}
    - {name: score, type: DOUBLE}
    - {name: score_uncalibrated, type: DOUBLE}  # raw model output; equals score when calibration is off
    - {name: rank, type: BIGINT}
  partition_cols:
    - {name: snap_date, type: STRING}
    - {name: prod_name, type: STRING}
    - {name: model_version, type: STRING}
