# Source Tables
feature_table:
  type: ParquetDataset
  filepath: data/feature_table.parquet
  backend: pandas

label_table:
  type: ParquetDataset
  filepath: data/label_table.parquet
  backend: pandas

sample_pool:
  type: ParquetDataset
  filepath: data/sample_pool.parquet
  backend: pandas

# Dataset Building Pipeline - Intermediate Outputs
sample_keys:
  type: ParquetDataset
  filepath: data/dataset/${dataset_version}/sample_keys.parquet
  backend: pandas

train_keys:
  type: ParquetDataset
  filepath: data/dataset/${dataset_version}/train_keys.parquet
  backend: pandas

train_dev_keys:
  type: ParquetDataset
  filepath: data/dataset/${dataset_version}/train_dev_keys.parquet
  backend: pandas

val_keys:
  type: ParquetDataset
  filepath: data/dataset/${dataset_version}/val_keys.parquet
  backend: pandas

train_set:
  type: ParquetDataset
  filepath: data/dataset/${dataset_version}/train_set.parquet
  backend: pandas

train_dev_set:
  type: ParquetDataset
  filepath: data/dataset/${dataset_version}/train_dev_set.parquet
  backend: pandas

val_set:
  type: ParquetDataset
  filepath: data/dataset/${dataset_version}/val_set.parquet
  backend: pandas

calibration_keys:
  type: ParquetDataset
  filepath: data/dataset/${dataset_version}/calibration_keys.parquet
  backend: pandas

test_keys:
  type: ParquetDataset
  filepath: data/dataset/${dataset_version}/test_keys.parquet
  backend: pandas

calibration_set:
  type: ParquetDataset
  filepath: data/dataset/${dataset_version}/calibration_set.parquet
  backend: pandas

test_set:
  type: ParquetDataset
  filepath: data/dataset/${dataset_version}/test_set.parquet
  backend: pandas

# Dataset Building Pipeline - Model Inputs
train_model_input:
  type: ParquetDataset
  filepath: data/dataset/${dataset_version}/train_model_input.parquet
  backend: pandas

train_dev_model_input:
  type: ParquetDataset
  filepath: data/dataset/${dataset_version}/train_dev_model_input.parquet
  backend: pandas

val_model_input:
  type: ParquetDataset
  filepath: data/dataset/${dataset_version}/val_model_input.parquet
  backend: pandas

test_model_input:
  type: ParquetDataset
  filepath: data/dataset/${dataset_version}/test_model_input.parquet
  backend: pandas

calibration_model_input:
  type: ParquetDataset
  filepath: data/dataset/${dataset_version}/calibration_model_input.parquet
  backend: pandas

# Training Pipeline
model:
  type: ModelAdapterDataset
  filepath: data/models/${model_version}/model.txt

best_params:
  type: JSONDataset
  filepath: data/models/${model_version}/best_params.json

evaluation_results:
  type: JSONDataset
  filepath: data/models/${model_version}/evaluation_results.json

preprocessor:
  type: PickleDataset
  filepath: data/dataset/${dataset_version}/preprocessor.pkl

category_mappings:
  type: JSONDataset
  filepath: data/dataset/${dataset_version}/category_mappings.json

# Inference Pipeline
scoring_dataset:
  type: ParquetDataset
  filepath: data/inference/${model_version}/${snap_date}/scoring_dataset.parquet
  backend: pandas

score_table:
  type: ParquetDataset
  filepath: data/inference/${model_version}/${snap_date}/score_table.parquet
  backend: pandas

ranked_predictions:
  type: ParquetDataset
  filepath: data/inference/${model_version}/${snap_date}/ranked_predictions.parquet
  backend: pandas

validated_predictions:
  type: ParquetDataset
  filepath: data/inference/${model_version}/${snap_date}/validated_predictions.parquet
  backend: pandas
