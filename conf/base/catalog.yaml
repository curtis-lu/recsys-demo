# Production overrides - Spark backend, Hive tables on HDFS.
# Three-layer versioning: base_dataset_version keys invariant artifacts;
# train_variant_id keys per-train-sampling artifacts; calibration_variant_id
# keys per-calibration-sampling artifacts. Each layer lives under a different
# HDFS path (base / train_variants / calibration_variants) and table names
# carry the corresponding version suffixes.

# --- Source tables (read-only, managed by source_etl) ---
feature_table:
  type: HiveTableDataset
  database: ${hive.db}
  table: feature_table
  read_only: true

label_table:
  type: HiveTableDataset
  database: ${hive.db}
  table: label_table
  read_only: true

sample_pool:
  type: HiveTableDataset
  database: ${hive.db}
  table: sample_pool
  read_only: true

# --- Dataset base layer (per base_dataset_version) ---
# Single Hive table per logical artifact; base_dataset_version is the outer
# partition column. snap_date is the inner dynamic partition.
val_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: val_keys
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
  partition_cols:
    - {name: snap_date, type: STRING}

test_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: test_keys
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
  partition_cols:
    - {name: snap_date, type: STRING}

val_model_input:
  type: HiveTableDataset
  database: ${hive.db}
  table: val_model_input
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
  partition_cols:
    - {name: snap_date, type: STRING}

test_model_input:
  type: HiveTableDataset
  database: ${hive.db}
  table: test_model_input
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
  partition_cols:
    - {name: snap_date, type: STRING}

preprocessor:
  type: JSONDataset
  filepath: data/dataset/${base_dataset_version}/preprocessor.json

category_mappings:
  type: JSONDataset
  filepath: data/dataset/${base_dataset_version}/category_mappings.json

# --- Dataset train-variant layer (per base + train_variant) ---
sample_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: sample_keys
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
    train_variant_id: ${train_variant_id}
  partition_cols:
    - {name: snap_date, type: STRING}

train_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: train_keys
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
    train_variant_id: ${train_variant_id}
  partition_cols:
    - {name: snap_date, type: STRING}

train_dev_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: train_dev_keys
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
    train_variant_id: ${train_variant_id}
  partition_cols:
    - {name: snap_date, type: STRING}

train_model_input:
  type: HiveTableDataset
  database: ${hive.db}
  table: train_model_input
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
    train_variant_id: ${train_variant_id}
  partition_cols:
    - {name: snap_date, type: STRING}

train_dev_model_input:
  type: HiveTableDataset
  database: ${hive.db}
  table: train_dev_model_input
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
    train_variant_id: ${train_variant_id}
  partition_cols:
    - {name: snap_date, type: STRING}

# --- Dataset calibration-variant layer (per base + calibration_variant) ---
calibration_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: calibration_keys
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
    calibration_variant_id: ${calibration_variant_id}
  partition_cols:
    - {name: snap_date, type: STRING}

calibration_model_input:
  type: HiveTableDataset
  database: ${hive.db}
  table: calibration_model_input
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
    calibration_variant_id: ${calibration_variant_id}
  partition_cols:
    - {name: snap_date, type: STRING}

# --- Training Pipeline - Binary / non-DataFrame artifacts (driver-local) ---
# ModelAdapterDataset / JSONDataset 用 Python 內建 open() 寫檔，不認 hdfs:// scheme，
# 因此寫到本機 host fs（與 cached_* 同一原則）。
model:
  type: ModelAdapterDataset
  filepath: data/models/${model_version}/model.txt

best_params:
  type: JSONDataset
  filepath: data/models/${model_version}/best_params.json

evaluation_results:
  type: JSONDataset
  filepath: data/models/${model_version}/evaluation_results.json

# Note: cached_*_model_input are intentionally not registered here.
# Persistence is owned by training/nodes.py::_cache_or_passthrough
# (driver-local parquet via hadoop fs copyToLocal); catalog auto-creates
# MemoryDataset for these names for in-memory passthrough between nodes.
# See docs/superpowers/specs/2026-05-07-training-cache-hdfs-copy-design.md

# --- Inference Pipeline - Hive managed table with dynamic partition overwrite ---
# Each run only overwrites partitions present in the DataFrame (snap_date x prod_name x model_version).
score_table:
  type: HiveTableDataset
  database: ${hive.db}
  table: score_table
  external: false
  columns:
    - {name: cust_id, type: STRING}
    - {name: score, type: DOUBLE}
  partition_cols:
    - {name: snap_date, type: STRING}
    - {name: prod_name, type: STRING}
    - {name: model_version, type: STRING}

validated_predictions:
  type: HiveTableDataset
  database: ${hive.db}
  table: ranked_predictions
  external: false
  columns:
    - {name: cust_id, type: STRING}
    - {name: score, type: DOUBLE}
    - {name: rank, type: BIGINT}
  partition_cols:
    - {name: snap_date, type: STRING}
    - {name: prod_name, type: STRING}
    - {name: model_version, type: STRING}
