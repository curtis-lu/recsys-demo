# Production overrides — Hive tables on HDFS。
# 三層 versioning：base_dataset_version 對應「與抽樣無關」的不變產物；
# train_variant_id 對應「依 train sampling」的產物；calibration_variant_id
# 對應「依 calibration sampling」的產物。三層分別落在不同 HDFS path
# （base / train_variants / calibration_variants），table 名也帶各自的 version
# 後綴。

# hive.db 定義於 parameters.yaml，供 catalog.yaml 參照。

# --- Source tables（唯讀，由 source_etl 維護）---
feature_table:
  type: HiveTableDataset
  database: ${hive.db}
  table: feature_table
  read_only: true

label_table:
  type: HiveTableDataset
  database: ${hive.db}
  table: label_table
  read_only: true

sample_pool:
  type: HiveTableDataset
  database: ${hive.db}
  table: sample_pool
  read_only: true

# --- Dataset base layer（依 base_dataset_version 區分）---
# 每個邏輯 artifact 一張 Hive table；base_dataset_version 是外層 partition column，
# snap_date 為內層的 dynamic partition。
val_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: recsys_prod_val_keys
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
  partition_cols:
    - {name: snap_date, type: STRING}

test_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: recsys_prod_test_keys
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
  partition_cols:
    - {name: snap_date, type: STRING}

val_model_input:
  type: HiveTableDataset
  database: ${hive.db}
  table: recsys_prod_val_model_input
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
  partition_cols:
    - {name: snap_date, type: STRING}

test_model_input:
  type: HiveTableDataset
  database: ${hive.db}
  table: recsys_prod_test_model_input
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
  partition_cols:
    - {name: snap_date, type: STRING}
    - {name: prod_name, type: STRING}

preprocessor:
  type: JSONDataset
  filepath: data/dataset/${base_dataset_version}/preprocessor.json

category_mappings:
  type: JSONDataset
  filepath: data/dataset/${base_dataset_version}/category_mappings.json

# --- Dataset train-variant layer（依 base + train_variant 區分）---
sample_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: recsys_prod_sample_keys
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
    train_variant_id: ${train_variant_id}
  partition_cols:
    - {name: snap_date, type: STRING}

train_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: recsys_prod_train_keys
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
    train_variant_id: ${train_variant_id}
  partition_cols:
    - {name: snap_date, type: STRING}

train_dev_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: recsys_prod_train_dev_keys
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
    train_variant_id: ${train_variant_id}
  partition_cols:
    - {name: snap_date, type: STRING}

preprocessed_feature_table:
    type: HiveTableDataset
    database: ${hive.db}
    table: recsys_prod_preprocessed_feature_table
    external: false
    columns: "auto"
    partition_filter:
      base_dataset_version: ${base_dataset_version}
    partition_cols:
      - {name: snap_date, type: STRING}

train_model_input:
  type: HiveTableDataset
  database: ${hive.db}
  table: recsys_prod_train_model_input
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
    train_variant_id: ${train_variant_id}
  partition_cols:
    - {name: snap_date, type: STRING}

train_dev_model_input:
  type: HiveTableDataset
  database: ${hive.db}
  table: recsys_prod_train_dev_model_input
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
    train_variant_id: ${train_variant_id}
  partition_cols:
    - {name: snap_date, type: STRING}

# --- Dataset calibration-variant layer（依 base + calibration_variant 區分）---
calibration_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: recsys_prod_calibration_keys
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
    calibration_variant_id: ${calibration_variant_id}
  partition_cols:
    - {name: snap_date, type: STRING}

calibration_model_input:
  type: HiveTableDataset
  database: ${hive.db}
  table: recsys_prod_calibration_model_input
  external: false
  columns: "auto"
  partition_filter:
    base_dataset_version: ${base_dataset_version}
    calibration_variant_id: ${calibration_variant_id}
  partition_cols:
    - {name: snap_date, type: STRING}

# --- Training pipeline — binary / 非 DataFrame artifact（driver-local）---
# ModelAdapterDataset / JSONDataset 用 Python 內建 open() 寫檔，不認 hdfs:// scheme，
# 因此寫到 driver-local fs（與 cached_* 同一原則）。
model:
  type: ModelAdapterDataset
  filepath: data/models/${model_version}/model.txt

best_params:
  type: JSONDataset
  filepath: data/models/${model_version}/best_params.json

best_iteration:
  type: JSONDataset
  filepath: data/models/${model_version}/best_iteration.json

# hpo/ subdirectory is REQUIRED: ModelAdapterDataset writes a model_meta.json
# sidecar next to its filepath; sharing a directory with `model` would let the
# two datasets overwrite each other's sidecar (calibration flag cross-talk).
hpo_best_model:
  type: ModelAdapterDataset
  filepath: data/models/${model_version}/hpo/model.txt

evaluation_results:
  type: JSONDataset
  filepath: data/models/${model_version}/evaluation_results.json

feature_statistics:
  type: JSONDataset
  filepath: data/models/${model_version}/diagnostics/feature_statistics.json

feature_importance:
  type: JSONDataset
  filepath: data/models/${model_version}/diagnostics/feature_importance.json

shap_diagnostics:
  type: JSONDataset
  filepath: data/models/${model_version}/diagnostics/shap_diagnostics.json

evaluation_report:
  type: TextDataset
  filepath: data/evaluation/${model_version}/${snap_date}/report.html

evaluation_comparison_report:
  type: TextDataset
  filepath: data/evaluation/${model_version}/${snap_date}/report_comparison.html

# Note: training cache 由 training/nodes.py::_materialize_parquet_handle
# 直接從 Hive table location `copyToLocal` 搬到 driver-local parquet，不經
# catalog 持久化；cache node outputs（ParquetHandle）走 framework
# auto-MemoryDataset 在 DAG 中銜接。

# --- Training pipeline — test-set 預測結果（供下游 evaluation 重複使用）---
# 由 training/nodes.py::predict_and_write_test_predictions 寫入；同 pipeline
# 內由 compute_test_mAP_spark 與 evaluation/nodes_spark.py::prepare_eval_data
# (--post-training mode) 讀回。只有 test window 內至少 1 個 positive label 的
# 客戶會被 scoring 並寫入；不存 rank ──Spark mAP 端會用 rank_within_query
# 重算。
training_eval_predictions:
  type: HiveTableDataset
  database: ${hive.db}
  table: training_eval_predictions
  external: false
  columns:
    - {name: cust_id, type: STRING}
    - {name: score, type: DOUBLE}
    - {name: score_uncalibrated, type: DOUBLE}  # 模型原始輸出；calibration 關閉時等於 score
    - {name: label, type: INT}
  partition_filter:
    model_version: ${model_version}
  partition_cols:
    - {name: snap_date, type: STRING}
    - {name: prod_name, type: STRING}

# --- Evaluation pipeline — 快取後可直接用於 report 的 eval_predictions ---
# 由 evaluation/comparison_nodes.py::persist_eval_predictions 寫入
# （prepare_eval_data 產出、做完 label join、rank 與 segment enrichment 後的
# in-memory eval_predictions）。--compare-only 模式由 catalog auto-load 讀回，
# 並由 validate_enriched_eval_predictions_present（B4 validator）檢查。
# columns: "auto" ── schema 從 DataFrame 推得；若 segment_sources 設定在兩次
# run 之間改變，請先 drop 此 table 再重跑（ALTER TABLE schema evolution 是
# 待辦的 follow-up）。
enriched_eval_predictions:
  type: HiveTableDataset
  database: ${hive.db}
  table: enriched_eval_predictions
  external: false
  columns: "auto"
  partition_filter:
    model_version: ${model_version}
  partition_cols:
    - {name: snap_date, type: STRING}

# --- Inference pipeline — Hive managed table，採 dynamic partition overwrite ---
# 每次 run 只覆寫 DataFrame 內存在的 partition（snap_date × prod_name × model_version）。
score_table:
  type: HiveTableDataset
  database: ${hive.db}
  table: score_table
  external: false
  columns:
    - {name: cust_id, type: STRING}
    - {name: score, type: DOUBLE}
  partition_cols:
    - {name: snap_date, type: STRING}
    - {name: prod_name, type: STRING}
    - {name: model_version, type: STRING}

# --- Inference pipeline — 發布前 staging（managed Hive table）---
# rank_predictions 先把排名寫進 staging；validate_predictions 讀此表跑 sanity
# checks（raise 即整批中止）。驗證通過後才由 publish_predictions 寫入 production
# 的 ranked_predictions。驗證失敗時 production 完全不被觸碰，本表保留失敗批次供排查。
ranked_staging:
  type: HiveTableDataset
  database: ${hive.db}
  table: ranked_staging
  external: false
  columns:
    - {name: cust_id, type: STRING}
    - {name: score, type: DOUBLE}
    - {name: rank, type: BIGINT}
  partition_cols:
    - {name: snap_date, type: STRING}
    - {name: prod_name, type: STRING}
    - {name: model_version, type: STRING}

# --- Inference pipeline（續）— production 輸出 + Evaluation 讀取端入口 ---
# 由 publish_predictions 寫入（唯一一次 production 寫入，且只在 validate 通過後執行）。
# evaluation pipeline 也讀這張表；獨立宣告確保它在同 session 沒跑 inference 時也能
# standalone 讀，避免 core/catalog.py:71 對未知名稱 fallback 成 MemoryDataset 而
# 「靜默地壞掉」。
ranked_predictions:
  type: HiveTableDataset
  database: ${hive.db}
  table: ranked_predictions
  external: false
  columns:
    - {name: cust_id, type: STRING}
    - {name: score, type: DOUBLE}
    - {name: rank, type: BIGINT}
  partition_cols:
    - {name: snap_date, type: STRING}
    - {name: prod_name, type: STRING}
    - {name: model_version, type: STRING}
