# Source Tables
feature_table:
  type: ParquetDataset
  filepath: data/feature_table.parquet
  backend: pandas

label_table:
  type: ParquetDataset
  filepath: data/label_table.parquet
  backend: pandas

sample_pool:
  type: ParquetDataset
  filepath: data/sample_pool.parquet
  backend: pandas

# --- Dataset Building Pipeline ---
# Base layer: artifacts invariant under train/calibration sampling changes.
val_keys:
  type: ParquetDataset
  filepath: data/dataset/${base_dataset_version}/val_keys.parquet
  backend: pandas

test_keys:
  type: ParquetDataset
  filepath: data/dataset/${base_dataset_version}/test_keys.parquet
  backend: pandas

preprocessed_feature_table:
  type: ParquetDataset
  filepath: data/dataset/${base_dataset_version}/preprocessed_feature_table.parquet
  backend: pandas

val_model_input:
  type: ParquetDataset
  filepath: data/dataset/${base_dataset_version}/val_model_input.parquet
  backend: pandas

test_model_input:
  type: ParquetDataset
  filepath: data/dataset/${base_dataset_version}/test_model_input.parquet
  backend: pandas

preprocessor:
  type: JSONDataset
  filepath: data/dataset/${base_dataset_version}/preprocessor.json

category_mappings:
  type: JSONDataset
  filepath: data/dataset/${base_dataset_version}/category_mappings.json

# Train variant layer: keyed by (base, train_variant).
sample_keys:
  type: ParquetDataset
  filepath: data/dataset/${base_dataset_version}/train_variants/${train_variant_id}/sample_keys.parquet
  backend: pandas

train_keys:
  type: ParquetDataset
  filepath: data/dataset/${base_dataset_version}/train_variants/${train_variant_id}/train_keys.parquet
  backend: pandas

train_dev_keys:
  type: ParquetDataset
  filepath: data/dataset/${base_dataset_version}/train_variants/${train_variant_id}/train_dev_keys.parquet
  backend: pandas

train_model_input:
  type: ParquetDataset
  filepath: data/dataset/${base_dataset_version}/train_variants/${train_variant_id}/train_model_input.parquet
  backend: pandas

train_dev_model_input:
  type: ParquetDataset
  filepath: data/dataset/${base_dataset_version}/train_variants/${train_variant_id}/train_dev_model_input.parquet
  backend: pandas

# Calibration variant layer: keyed by (base, calibration_variant).
calibration_keys:
  type: ParquetDataset
  filepath: data/dataset/${base_dataset_version}/calibration_variants/${calibration_variant_id}/calibration_keys.parquet
  backend: pandas

calibration_model_input:
  type: ParquetDataset
  filepath: data/dataset/${base_dataset_version}/calibration_variants/${calibration_variant_id}/calibration_model_input.parquet
  backend: pandas

# Training Pipeline
model:
  type: ModelAdapterDataset
  filepath: data/models/${model_version}/model.txt

best_params:
  type: JSONDataset
  filepath: data/models/${model_version}/best_params.json

evaluation_results:
  type: JSONDataset
  filepath: data/models/${model_version}/evaluation_results.json

# Inference Pipeline
scoring_dataset:
  type: ParquetDataset
  filepath: data/inference/${model_version}/${snap_date}/scoring_dataset.parquet
  backend: pandas

score_table:
  type: ParquetDataset
  filepath: data/inference/${model_version}/${snap_date}/score_table.parquet
  backend: pandas

ranked_predictions:
  type: ParquetDataset
  filepath: data/inference/${model_version}/${snap_date}/ranked_predictions.parquet
  backend: pandas

validated_predictions:
  type: ParquetDataset
  filepath: data/inference/${model_version}/${snap_date}/validated_predictions.parquet
  backend: pandas

# Evaluation Pipeline
eval_predictions:
  type: ParquetDataset
  filepath: data/evaluation/${model_version}/${snap_date}/eval_predictions.parquet
  backend: pandas

evaluation_metrics:
  type: JSONDataset
  filepath: data/evaluation/${model_version}/${snap_date}/metrics.json

evaluation_report:
  type: TextDataset
  filepath: data/evaluation/${model_version}/${snap_date}/report.html

# Baselines Pipeline
baseline_predictions:
  type: ParquetDataset
  filepath: data/baselines/${snap_date}/baseline_predictions.parquet
  backend: pandas

baseline_metrics:
  type: JSONDataset
  filepath: data/baselines/${snap_date}/baseline_metrics.json
