# Production overrides - Spark backend, Hive tables on HDFS.
# Three-layer versioning: base_dataset_version keys invariant artifacts;
# train_variant_id keys per-train-sampling artifacts; calibration_variant_id
# keys per-calibration-sampling artifacts. Each layer lives under a different
# HDFS path (base / train_variants / calibration_variants) and table names
# carry the corresponding version suffixes.

# --- Source tables (read-only, managed by source_etl) ---
feature_table:
  type: HiveTableDataset
  database: ${hive.db}
  table: feature_table
  read_only: true

label_table:
  type: HiveTableDataset
  database: ${hive.db}
  table: label_table
  read_only: true

sample_pool:
  type: HiveTableDataset
  database: ${hive.db}
  table: sample_pool
  read_only: true

# --- Dataset base layer (per base_dataset_version) ---
val_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: val_keys_${base_dataset_version}
  external: false
  columns: "auto"

test_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: test_keys_${base_dataset_version}
  external: false
  columns: "auto"

val_model_input:
  type: HiveTableDataset
  database: ${hive.db}
  table: val_model_input_${base_dataset_version}
  external: false
  columns: "auto"

test_model_input:
  type: HiveTableDataset
  database: ${hive.db}
  table: test_model_input_${base_dataset_version}
  external: false
  columns: "auto"

preprocessor:
  type: JSONDataset
  filepath: data/dataset/${base_dataset_version}/preprocessor.json

category_mappings:
  type: JSONDataset
  filepath: data/dataset/${base_dataset_version}/category_mappings.json

# --- Dataset train-variant layer (per base + train_variant) ---
sample_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: sample_keys_${base_dataset_version}_${train_variant_id}
  external: false
  columns: "auto"
  partition_cols:
    - {name: snap_date, type: STRING}

train_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: train_keys_${base_dataset_version}_${train_variant_id}
  external: false
  columns: "auto"

train_dev_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: train_dev_keys_${base_dataset_version}_${train_variant_id}
  external: false
  columns: "auto"

train_model_input:
  type: HiveTableDataset
  database: ${hive.db}
  table: train_model_input_${base_dataset_version}_${train_variant_id}
  external: false
  columns: "auto"

train_dev_model_input:
  type: HiveTableDataset
  database: ${hive.db}
  table: train_dev_model_input_${base_dataset_version}_${train_variant_id}
  external: false
  columns: "auto"

# --- Dataset calibration-variant layer (per base + calibration_variant) ---
calibration_keys:
  type: HiveTableDataset
  database: ${hive.db}
  table: calibration_keys_${base_dataset_version}_${calibration_variant_id}
  external: false
  columns: "auto"

calibration_model_input:
  type: HiveTableDataset
  database: ${hive.db}
  table: calibration_model_input_${base_dataset_version}_${calibration_variant_id}
  external: false
  columns: "auto"

# --- Training Pipeline - Binary / non-DataFrame artifacts (driver-local) ---
# ModelAdapterDataset / JSONDataset 用 Python 內建 open() 寫檔，不認 hdfs:// scheme，
# 因此寫到本機 host fs（與 cached_* 同一原則）。
model:
  type: ModelAdapterDataset
  filepath: data/models/${model_version}/model.txt

best_params:
  type: JSONDataset
  filepath: data/models/${model_version}/best_params.json

evaluation_results:
  type: JSONDataset
  filepath: data/models/${model_version}/evaluation_results.json

# --- Training Pipeline - Driver-local parquet cache (per base + variant) ---
# These mirror the dataset-layer paths but live on driver-local disk so that
# rerunning the training pipeline (e.g. with new hyperparameters) does not
# rescan Hive. Requires spark.master=local[*] (driver=executor 同 JVM)，否則
# distributed worker container 看不到 host fs。Skip-if-exists 由 cache node
# 與 ParquetDataset 的 write_mode=ignore 雙重保證。
cached_val_model_input:
  type: ParquetDataset
  filepath: file:///Users/curtislu/projects/recsys_tfb/data/recsys_cache/${base_dataset_version}/val_model_input.parquet
  backend: spark
  partition_cols: [snap_date, prod_name]
  write_mode: ignore

cached_train_model_input:
  type: ParquetDataset
  filepath: file:///Users/curtislu/projects/recsys_tfb/data/recsys_cache/${base_dataset_version}/train_variants/${train_variant_id}/train_model_input.parquet
  backend: spark
  partition_cols: [snap_date, prod_name]
  write_mode: ignore

cached_train_dev_model_input:
  type: ParquetDataset
  filepath: file:///Users/curtislu/projects/recsys_tfb/data/recsys_cache/${base_dataset_version}/train_variants/${train_variant_id}/train_dev_model_input.parquet
  backend: spark
  partition_cols: [snap_date, prod_name]
  write_mode: ignore

cached_calibration_model_input:
  type: ParquetDataset
  filepath: file:///Users/curtislu/projects/recsys_tfb/data/recsys_cache/${base_dataset_version}/calibration_variants/${calibration_variant_id}/calibration_model_input.parquet
  backend: spark
  partition_cols: [snap_date, prod_name]
  write_mode: ignore

# --- Inference Pipeline - Hive managed table with dynamic partition overwrite ---
# Each run only overwrites partitions present in the DataFrame (snap_date x prod_name x model_version).
score_table:
  type: HiveTableDataset
  database: ${hive.db}
  table: score_table
  external: false
  columns:
    - {name: cust_id, type: STRING}
    - {name: score, type: DOUBLE}
  partition_cols:
    - {name: snap_date, type: STRING}
    - {name: prod_name, type: STRING}
    - {name: model_version, type: STRING}

validated_predictions:
  type: HiveTableDataset
  database: ${hive.db}
  table: ranked_predictions
  external: false
  columns:
    - {name: cust_id, type: STRING}
    - {name: score, type: DOUBLE}
    - {name: rank, type: BIGINT}
  partition_cols:
    - {name: snap_date, type: STRING}
    - {name: prod_name, type: STRING}
    - {name: model_version, type: STRING}
