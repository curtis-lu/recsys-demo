dataset:
  # --- Train 日期範圍 ---
  train_snap_date_start: "2025-01-31"
  train_snap_date_end: "2025-10-31"

  # --- 抽樣 ---
  sample_ratio: 0.8
  sample_group_keys:
    - "cust_segment_typ"
    - "prod_name"
  sample_ratio_overrides:
  # 多欄位 sample_group_keys 時，用 "|" 組合序列化為 key
  # 範例（sample_group_keys: [cust_segment_typ, prod_name]）：
    "mass|信用卡": 0.8
    "affluent|基金": 0.3
    "hnw|保險": 0.2
  # 未指定的組合用預設 sample_ratio

  # --- Train / Train-dev（共用日期，按 cust_id ratio 切分）---
  train_dev_ratio: 0.1

  # --- Calibration（optional）---
  enable_calibration: false
  calibration_snap_dates: []
  calibration_sample_ratio: 1.0

  # --- Validation ---
  val_snap_dates:
    - "2025-11-30"
  val_sample_ratio: 1.0

  # --- Test ---
  test_snap_dates:
    - "2025-12-31"

  prepare_model_input:
    drop_columns:
      - "snap_date"
      - "cust_id"
      - "label"
      - "apply_start_date"
      - "apply_end_date"
      - "cust_segment_typ"
    categorical_columns:
      - "prod_name"
      - "gender"
      - "risk_attr"
      - "education_level"
      - "marital_status"
      - "channel_preference"
