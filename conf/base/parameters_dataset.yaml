dataset:
  # --- Train 月底 snap_date list ---
  # 顯式列出（避免上游 cadence 變動時 silently 吞下，符合 ML lineage 慣例）
  # 產生：pd.date_range(start, end, freq="ME").strftime("%Y-%m-%d").tolist()
  train_snap_dates:
    - "2025-01-31"
    - "2025-02-28"
    - "2025-03-31"
    - "2025-04-30"
    - "2025-05-31"
    - "2025-06-30"
    - "2025-07-31"
    - "2025-08-31"
    - "2025-09-30"
    - "2025-10-31"

  # --- 抽樣 ---
  sample_ratio: 1.0      # float [0,1]；★ 預設抽樣比例（決定性 hash，同 seed→同結果）
  sample_group_keys:     # ★分層維度（你的欄；多欄用 "|" 串成 override / weight key）
    - "cust_segment_typ"
    - "prod_name"
    - "label"
  sample_ratio_overrides:
  # 多欄位 sample_group_keys 時，用 "|" 組合序列化為 key
  # 範例（sample_group_keys: [cust_segment_typ, prod_name, label]）：
    "mass|ccard_ins|0": 0.5
    "affluent|ccard_ins|0": 0.9
    "hnw|ccard_ins|0": 0.8
  # 未指定的組合用預設 sample_ratio

  # --- Carry columns（沿用欄位）---
  # ★非 identity、要從 sample_pool 帶進 train/train_dev/calibration model_input
  # parquet 的欄位清單（供 training.sample_weights 分群；權重實際只套 train/train_dev）。
  # 寬鬆超集策略：一次列足想用的維度，weight 表只取需要的子集 → 改 weight 不需
  # 重產 dataset。⚠改此清單會 bust base_dataset_version（parquet schema 變、整批重算）。
  carry_columns:
    - cust_segment_typ

  # --- Train / Train-dev（共用日期，按 cust_id ratio 切分）---
  train_dev_ratio: 0.1

  # --- Calibration（optional）---
  enable_calibration: true
  calibration_snap_dates: ["2025-11-30"]
  calibration_sample_ratio: 1.0
  calibration_sample_ratio_overrides: {}
  # 格式同 sample_ratio_overrides，用 "|" 組合序列化為 key
  # 範例：{"mass|fund_mix": 0.8}
  # 未指定時 calibration 使用 calibration_sample_ratio 作為預設

  # --- Validation（驗證集）---
  val_snap_dates:
    - "2025-12-31"
  val_sample_ratio: 1.0

  # --- Test（測試集）---
  test_snap_dates:
    - "2026-01-31"

  prepare_model_input:
    drop_columns:
      - "snap_date"
      - "cust_id"
      - "label"
      - "apply_start_date"
      - "apply_end_date"
      - "cust_segment_typ"
    categorical_columns:
      - "prod_name"
      - "gender"
      - "risk_attr"
      - "education_level"
      - "marital_status"
      - "channel_preference"
