evaluation:
  # Evaluation 的 snap_date。必須是 ISO 日期格式（YYYY-MM-DD）：evaluation
  # pipeline 會把它和 DATE-typed snap_date column cast 成字串後比較
  # （cast 結果就是 YYYY-MM-DD）。Evaluation 輸出路徑會以
  # .replace("-", "") 正規化為 YYYYMMDD/ 子目錄。
  snap_date: "2026-01-31"

  # 單一 k superset。此處列出的每個 k 都會被算進所有 @K metric、所有粒度
  #（fine product overall/per-item/per-segment 與 category）。Report 各段
  # 透過 report.display.* 自行選要展示哪些 k 欄位。"all" 會在 runtime
  # 解析成該粒度的 distinct item 數。
  k_values: [1, 2, 3, 4, 5, "all"]

  # Per-segment metrics 切片用的 segment column。每個 column 都必須在下方
  # segment_sources 有對應 entry（config-consistency invariant A10）。
  segment_columns:
    - cust_segment_typ

  # 外部 segment 資料來源 ── 會以 key_columns 做 left join 進 eval_predictions
  # 的 Hive table。每個 entry 包含 `table`（Hive-qualified）、`key_columns`、
  # `segment_column`。設定了但讀不到的 source 會 fail loud。
  segment_sources:
    cust_segment_typ:
      table: ml_recsys.sample_pool
      key_columns: [cust_id, snap_date]
      segment_column: cust_segment_typ
    # 外部 Hive table 範例（保持註解狀態 ── 預設沒有這張表；若 enable
    # 卻沒有真實 table，evaluation 會 fail loud）：
    # holding_combo:
    #   table: ml_recsys.holding_combo
    #   key_columns: [cust_id, snap_date]
    #   segment_column: holding_combo

  # 產品大類的 parallel evaluation。enable 後，fine-grained eval_predictions
  # 會被 collapse 到 category 粒度（category score = max child score == best
  # child rank；category label = max child label），然後對「同一套」metric
  # pipeline 跑第二輪；結果 nest 在 "category" key 之下。
  product_categories:
    enabled: true
    unmapped: singleton          # 沒列在任何 list 的 product 自成一個 singleton category
    mapping:
      fund: [fund_stock, fund_bond, fund_mix]
      exchange: [exchange_fx, exchange_usd]
      ccard: [ccard_bill, ccard_cash, ccard_ins]

  # Baseline 設定 ── popularity baseline 的 lookback 視窗（月數）。
  baseline:
    lookback_months: 12

  # Report 產生選項
  report:
    sections:
      dataset_overview: true
      primary_map: true
      guardrail_recall: true
      per_item_attr: true
      category: true             # 同時受 product_categories.enabled 控制
      per_segment: true
      diagnostics: true
      baseline: true
    display:
      primary_map_k: [1, 3, 5, "all"]
      guardrail_recall_k: [1, 2, 3, 4, 5]
      recall_colorscale: {low: 0.0, high: 1.0}
    diagnostics:
      include_distributions: true
      include_calibration: true
      n_calibration_bins: 10
      # 診斷圖在 Spark 端聚合（bin 計數／quartile／rank 矩陣），體積與列數無關，
      # 不再需要 row 抽樣上限。

  # Compare sources（多模型比較）。有填內容的 entry 才 unlock
  # `evaluation --compare <key>` / `--compare-only <key>`；<key>（v_prev/ext_proj_x…）
  # 即 CLI flag 傳的值。★整段（含 key 名與各值）由你定義；預設空。
  # 完整 schema 由 core/consistency.py 的 A11 驗證（正典）；各 source 的用法、
  # kind 對照見 docs/pipelines/evaluation.md。
  # 可填欄位（值的合法集合）：
  #   kind            ∈ {model_version, external_hive}                （必填）
  #   label           任意字串（report_comparison.html 顯示名）        （必填）
  #   model_version   字串                                  （kind=model_version 必填）
  #   source          ∈ {enriched_eval_predictions, ranked_predictions,
  #                      training_eval_predictions}  （kind=model_version 選填，預設第一個）
  #   table           Hive-qualified 字串                   （kind=external_hive 必填）
  #   columns         我們的欄 → 外部欄名 map                （kind=external_hive 必填）
  #   prod_mapping    外部 prod_name → 我們的 prod_name（N:1，右側須 A6 已知值）（同上必填）
  #   unmapped_policy ∈ {fail, drop}                       （kind=external_hive，預設 fail）
  compare_sources: {}
  # 範本（拿掉 # 即啟用；★ 所有值由你填）：
  #compare_sources:
  #  v_prev:                                  # kind=model_version：另一個同框架版本
  #    kind: model_version
  #    label: "v_prev (上一版)"
  #    model_version: "2026-01-31_abcdef12_34567890"
  #    source: enriched_eval_predictions      # 選填，合法值見上
  #  ext_proj_x:                              # kind=external_hive：外部 Hive 表
  #    kind: external_hive
  #    label: "External Project X"
  #    table: other_project.predictions
  #    columns: {cust_id: customer_id, snap_date: as_of_date, prod_name: item_code, score: pred_score}
  #    prod_mapping: {ext_fund_a: fund_stock, ext_fund_b: fund_bond}
  #    unmapped_policy: fail                   # fail（預設）| drop
