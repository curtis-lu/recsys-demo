evaluation:
  # Evaluation 的 snap_date。必須是 ISO 日期格式（YYYY-MM-DD）：evaluation
  # pipeline 會把它和 DATE-typed snap_date column cast 成字串後比較
  # （cast 結果就是 YYYY-MM-DD）。Evaluation 輸出路徑會以
  # .replace("-", "") 正規化為 YYYYMMDD/ 子目錄。
  snap_date: "2026-01-31"

  # 單一 k superset。此處列出的每個 k 都會被算進所有 @K metric、所有粒度
  #（fine product overall/per-item/per-segment 與 category）。Report 各段
  # 透過 report.display.* 自行選要展示哪些 k 欄位。"all" 會在 runtime
  # 解析成該粒度的 distinct item 數。
  k_values: [1, 2, 3, 4, 5, "all"]

  # Per-segment metrics 切片用的 segment column。每個 column 都必須在下方
  # segment_sources 有對應 entry（config-consistency invariant A10）。
  segment_columns:
    - cust_segment_typ

  # 外部 segment 資料來源 ── 會以 key_columns 做 left join 進 eval_predictions
  # 的 Hive table。每個 entry 包含 `table`（Hive-qualified）、`key_columns`、
  # `segment_column`。設定了但讀不到的 source 會 fail loud。
  segment_sources:
    cust_segment_typ:
      table: ml_recsys.sample_pool
      key_columns: [cust_id, snap_date]
      segment_column: cust_segment_typ
    # 外部 Hive table 範例（保持註解狀態 ── 預設沒有這張表；若 enable
    # 卻沒有真實 table，evaluation 會 fail loud）：
    # holding_combo:
    #   table: ml_recsys.holding_combo
    #   key_columns: [cust_id, snap_date]
    #   segment_column: holding_combo

  # 產品大類的 parallel evaluation。enable 後，fine-grained eval_predictions
  # 會被 collapse 到 category 粒度（category score = max child score == best
  # child rank；category label = max child label），然後對「同一套」metric
  # pipeline 跑第二輪；結果 nest 在 "category" key 之下。
  product_categories:
    enabled: true                # bool
    unmapped: singleton          # ∈ {singleton}（目前唯一支援）；沒列入任何 list 的 product 自成一類
    mapping:                      # ★大類 → 子 product 清單（值由你定義；右側須 A6 已知 item）
      fund: [fund_stock, fund_bond, fund_mix]
      exchange: [exchange_fx, exchange_usd]
      ccard: [ccard_bill, ccard_cash, ccard_ins]

  # Baseline 設定 ── popularity baseline 的 lookback 視窗（月數）。
  baseline:
    lookback_months: 12

  # Report 產生選項
  report:
    sections:
      dataset_overview: true
      primary_map: true
      guardrail_recall: true
      per_item_attr: true
      category: true             # 同時受 product_categories.enabled 控制
      per_segment: true
      diagnostics: true
      baseline: true
      offset_sweep: true
    display:
      primary_map_k: [1, 3, 5, "all"]
      guardrail_recall_k: [1, 2, 3, 4, 5]
      recall_colorscale: {low: 0.0, high: 1.0}
    diagnostics:
      include_distributions: true
      include_calibration: true
      n_calibration_bins: 10
      # 診斷圖在 Spark 端聚合（bin 計數／quartile／rank 矩陣），體積與列數無關，
      # 不再需要 row 抽樣上限。

  # 主指標參數化家族（框架診斷項目 4；A15）。預設值全部等價現行為：
  # weight_alpha=0 ＝ item 等權 macro；min_positives=0 ＝ 不設觀察名單門檻；
  # shrinkage_k=0 ＝ 不收縮。作用順序：min_positives 先排除 → shrinkage 向
  # pooled（n_pos 加權）平均收縮 → weight_alpha 加權（w_j ∝ n_pos^α）。
  # 只作用於 item 粒度（by_item / by_item_segment）；by_segment 維持等權。
  # k = 診斷側（CI）計算 AP 的截斷 k；null ＝ 不截斷（full mAP）。
  metric:
    weight_alpha: 0.0
    k: null
    min_positives: 0
    shrinkage_k: 0

  # 評估側診斷（Phase 1 起；spec §2 共用抽樣底座 + §3 Phase 1 CI）。
  # 每項診斷只有這一個開關。關掉 => 仍會落地一份 {"enabled": false} 的 stub
  # JSON、但不產生頁面。想讓一項診斷「完全不存在」是改 code
  # （diagnosis.metric.contract.DIAGNOSES），不是改這裡。
  diagnosis:
    # 診斷抽樣：單位＝query（snap_date × cust_id）、只取有正例的 query；
    # 兩趟設計——正例 query 數低於保底的 item 整批全取，其餘 CRC32
    # hash-ratio 抽到補滿 max_queries。中型 item 抽後仍可能低於保底：
    # 不硬補，metadata 誠實回報（報表會標示樣本規模）。
    # max_queries 設在「有正例的 query 總數」之上 → ratio == 1.0 → 不觸發
    # 次抽樣，診斷是母體普查而非抽樣估計。2026-07-19 實況：公司環境有正例的
    # query 約 22 萬，故設 25 萬。driver 記憶體不是約束（128GB；25 萬 query ×
    # 22 個 item ≈ 5.5M 列 ≈ 1.25GB）。
    #
    # ⚠ 若母體成長超過此值，次抽樣會自動恢復：分層權重（inclusion_weight）
    # 會接手做 Horvitz–Thompson 修正，metadata 的 sampling_description 也會
    # 從「未抽樣」改口。**不會靜默偏差**，但普查的解讀更乾淨，發現超過時
    # 優先調高這個值而不是靠加權。
    #
    # 這個值不是控制運算成本的旋鈕——貴的診斷各自有自己的預算旋鈕
    # （見下方 score_shift 一帶），原則是「搜尋用子樣本、量測用全樣本」。
    # 用縮小共用樣本來省錢會讓便宜的診斷也一起失去母體性。
    sample:
      max_queries: 250000
      min_pos_queries_per_item: 50
      seed: 42
    # per-item AP 與 macro 的 cluster bootstrap CI（cluster＝cust_id，
    # 同一客戶跨期整批重抽）。driver 端 numpy、跑在上面的抽樣上。
    ci:
      enabled: true
      n_boot: 200

    # 分流層（A18）：offset sweep——在診斷抽樣上（driver 端 numpy）對每個
    # item 的 logit 分數加常數 δ、座標下降搜尋讓參數化 macro mAP 最大的
    # δ*。δ 單位 log-odds。holdout_fraction 切
    # query 折、折外報告防擬合雜訊；shrink_lambda 把 δ 向 0 收縮（座標目
    # 標 = mAP_fit − λ·δ²/M）。成本 ≈ rounds×items×grid點數 次 mAP 評估，
    # 大樣本時先調粗 grid.step。
    offset_sweep:
      enabled: true
      shrink_lambda: 0.1
      holdout_fraction: 0.5
      max_rounds: 5
      grid: {lo: -2.0, hi: 2.0, step: 0.05}

    # 診斷 1／5：配置引入的排序偏移。純 config 算術＋2 次 mAP＋每 item 一次
    # 替換實驗。用 score_uncalibrated（offset 活在模型輸出的 log-odds 空間，
    # 校準層是後貼的）。
    config_shift:
      enabled: true

    # 診斷 2／5：item 排序能力——同一 item 內正例列 vs 負例列的加權 AUC，
    # raw（原始分數）與 query_centered（扣掉各自 query 平均後）各算一次；
    # 差值即客戶活躍度被誤計入 item 推薦能力的量。用 score_uncalibrated（與
    # config_shift 同一個 log-odds 空間）。top_n＝正例名次百分位分布只看
    # macro per-item AP 最低的前幾個 item。
    item_ability:
      enabled: true
      top_n: 30

    # 診斷 3／5：模型容量分配——全模型 split gain 分成 Item Prior（item-id
    # 切點）、Post-Item Context（item 切點之後的 context 切點，逐 item 分配）
    # 與未分配三份；用來分辨「學到互動訊號」與「只記住 item prior」。不吃
    # 診斷抽樣，只讀訓練側的 gain_ledger（optional，可能缺席）＋同一次執行
    # 的 item_ability 結果畫對照散點。
    model_capacity:
      enabled: true

    # 診斷 4／5：壓制帳本與交叉購買——同一 query 內，label=0 的 item 排在
    # label=1 之前時，把該正例列的 AP 缺口依比例分攤給排在它上面的每個負例
    # （壓制矩陣熱圖）；並列出同一批 query 單位上的實際標籤共買 lift（泡泡
    # 格圖，同軸序對照）。top_examples＝具體案例表最多列出幾筆。
    suppression:
      enabled: true
      top_examples: 50

    # 驗收/測試專用：在計算前對指定 item 的 logit 分數加常數
    # （例 {ccard_ins: 1.0}）。只影響分流層節點（offset_sweep）；
    # 正式評估必須留空。
    debug_inject_offsets: {}

  # Compare sources（多模型比較）。有填內容的 entry 才 unlock
  # `evaluation --compare <key>` / `--compare-only <key>`；<key>（v_prev/ext_proj_x…）
  # 即 CLI flag 傳的值。★整段（含 key 名與各值）由你定義；預設空。
  # 完整 schema 由 core/consistency.py 的 A11 驗證（正典）；各 source 的用法、
  # kind 對照見 docs/pipelines/evaluation.md。
  # 可填欄位（值的合法集合）：
  #   kind            ∈ {model_version, external_hive}                （必填）
  #   label           任意字串（report_comparison.html 顯示名）        （必填）
  #   model_version   字串                                  （kind=model_version 必填）
  #   source          ∈ {enriched_eval_predictions, ranked_predictions,
  #                      training_eval_predictions}  （kind=model_version 選填，預設第一個）
  #   table           Hive-qualified 字串                   （kind=external_hive 必填）
  #   columns         我們的欄 → 外部欄名 map                （kind=external_hive 必填）
  #   prod_mapping    外部 prod_name → 我們的 prod_name（N:1，右側須 A6 已知值）（同上必填）
  #   unmapped_policy ∈ {fail, drop}                       （kind=external_hive，預設 fail）
  compare_sources: {}
  # 範本（拿掉 # 即啟用；★ 所有值由你填）：
  #compare_sources:
  #  v_prev:                                  # kind=model_version：另一個同框架版本
  #    kind: model_version
  #    label: "v_prev (上一版)"
  #    model_version: "2026-01-31_abcdef12_34567890"
  #    source: enriched_eval_predictions      # 選填，合法值見上
  #  ext_proj_x:                              # kind=external_hive：外部 Hive 表
  #    kind: external_hive
  #    label: "External Project X"
  #    table: other_project.predictions
  #    columns: {cust_id: customer_id, snap_date: as_of_date, prod_name: item_code, score: pred_score}
  #    prod_mapping: {ext_fund_a: fund_stock, ext_fund_b: fund_bond}
  #    unmapped_policy: fail                   # fail（預設）| drop
