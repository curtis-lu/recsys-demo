evaluation:
  # Snap date for evaluation (YYYYMMDD or YYYY-MM-DD).
  snap_date: "20251231"

  # K values for @K metrics. "all" is resolved at runtime to the total product count N.
  k_values: [5, "all"]

  # Segment columns already present in the labels DataFrame.
  segment_columns:
    - cust_segment_typ

  # External segment data sources — each a separate Parquet file
  # joined to labels on key_columns.
  segment_sources:
    holding_combo:
      filepath: data/holding_combo.parquet
      key_columns: [cust_id, snap_date]
      segment_column: holding_combo

  # Baseline configuration
  baseline:
    # Baseline type: global_popularity or segment_popularity
    type: global_popularity
    # Segment column for segment_popularity baseline
    segment_column: cust_segment_typ
    # Number of months of historical data to use for baseline calculation
    lookback_months: 12

  # Report generation options
  report:
    include_baseline_comparison: true
    include_calibration: true
    include_distributions: true
    n_calibration_bins: 10
