evaluation:
  # Snap date for evaluation. Must be an ISO date (YYYY-MM-DD): the evaluation
  # pipeline compares it against the DATE-typed snap_date column cast to string
  # (which yields YYYY-MM-DD). The evaluation output path normalises it via
  # .replace("-", "") so it still produces a clean YYYYMMDD/ directory.
  snap_date: "2025-12-31"

  # Single k superset. Every @K metric is computed at every k here, for all
  # granularities (fine product overall/per-item/per-segment AND category).
  # Report sections slice the k columns they show via report.display.*.
  # "all" resolves at runtime to the distinct item count of that granularity.
  k_values: [1, 2, 3, 4, 5, "all"]

  # Segment columns to slice per-segment metrics by. Each must be delivered by
  # a segment_sources entry below (config-consistency invariant A10).
  segment_columns:
    - cust_segment_typ

  # External segment data sources — Hive tables left-joined onto eval_predictions
  # on key_columns. Each entry: `table` (Hive-qualified), `key_columns`,
  # `segment_column`. A configured source that cannot be read fails loud.
  segment_sources:
    cust_segment_typ:
      table: ml_recsys.sample_pool
      key_columns: [cust_id, snap_date]
      segment_column: cust_segment_typ
    # External Hive-table example (kept commented — no such table by default;
    # an active entry with no real table would fail evaluation loud):
    # holding_combo:
    #   table: ml_recsys.holding_combo
    #   key_columns: [cust_id, snap_date]
    #   segment_column: holding_combo

  # Product major-category parallel evaluation. When enabled, the fine-grained
  # eval_predictions is collapsed to category grain (category score = max child
  # score == best child rank; category label = max child label) and the SAME
  # metric pipeline runs a second time; results nest under the "category" key.
  product_categories:
    enabled: true
    unmapped: singleton          # products not in any list -> own singleton category
    mapping:
      fund: [fund_stock, fund_bond, fund_mix]
      exchange: [exchange_fx, exchange_usd]
      ccard: [ccard_bill, ccard_cash, ccard_ins]

  # Baseline configuration — popularity baseline lookback window (months).
  baseline:
    lookback_months: 12

  # Report generation options
  report:
    sections:
      dataset_overview: true
      primary_map: true
      guardrail_recall: true
      per_item_attr: true
      category: true             # also gated by product_categories.enabled
      per_segment: true
      diagnostics: true
      baseline: true
    display:
      primary_map_k: [1, 3, 5, "all"]
      guardrail_recall_k: [1, 2, 3, 4, 5]
      recall_colorscale: {low: 0.0, high: 1.0}
    diagnostics:
      include_distributions: true
      include_calibration: true
      n_calibration_bins: 10
      sample_rows: null          # toPandas row cap for diagnostics; null = no sampling

  # Compare sources — populated entries unlock `evaluation --compare <key>` and
  # `--compare-only <key>`. Empty by default; remove the leading `#` on the
  # entries you actually use. Each key (`v_prev`, `ext_proj_x`, ...) is the
  # value passed on the CLI flag.
  #
  # Schema (validated by core.consistency.A11):
  #   kind:           "model_version" | "external_hive"     (required)
  #   label:          display name in report_comparison.html (required)
  #   model_version:  required when kind=model_version
  #   table:          required when kind=external_hive (Hive-qualified)
  #   columns:        required when kind=external_hive — left=our schema,
  #                   right=external column name (cust_id/snap_date/prod_name/score)
  #   prod_mapping:   required when kind=external_hive — N:1 map of external
  #                   prod_name → our prod_name; A6-known values on the right
  #   unmapped_policy: "fail" (default — raise on prod outside mapping) |
  #                    "drop" (filter and log warning)
  compare_sources: {}
