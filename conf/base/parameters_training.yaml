# model_version scope：只有「定義模型」的子集會被 hash 進 model_version——亦即
# `training:` 區塊扣掉純 logging / threading 的 `verbosity`、`log_period`、
# `num_threads`。下方的 `spark:`、`mlflow:`、`cache:` 區塊「不」影響
# model_version。Single source of truth：src/recsys_tfb/core/versioning.py ::
# _model_version_payload。
spark:
  app_name: recsys_tfb-training
  # spark.executor.memory: 16g
  # spark.executor.cores: 4
  # spark.driver.memory: 8g

training:
  algorithm: lightgbm
  algorithm_params:
    objective: binary
    metric: binary_logloss
    verbosity: -1
    # log_period：0 表示完全靜默；> 0 時，訓練過程每 N 個 boosting round 印一次
    # val metric（HPO 每個 trial + 最終 refit 都會印）。由 LightGBMAdapter 在
    # 進 lgb.train 前 pop 掉，並非 LGB 原生 param。
    log_period: 100
    # num_threads：釘定固定的 core count，避免 LightGBM fallback 到
    # OMP_NUM_THREADS=1 或被 cgroup 限縮的 cpu_count default。
    num_threads: 4
    # --- Learning-to-rank（Phase 1）--------------------------------------
    # 要訓練 ranking model，請改 objective 與 ranking metric，例如：
    #   objective: lambdarank      # 或 rank_xendcg
    #   metric: ndcg               # 必填 ranking metric；省略則預設 ndcg
    #   ndcg_eval_at: [5, 10]      # NDCG 截斷層級（選填）
    # 每個 query 的 group 來自 schema.columns.time + entity
    # （預設 snap_date + cust_id），會自動帶進 train/train_dev binaries 與 HPO
    # early stopping。ranking objective 配非 ranking metric 在 CLI 入口會被擋
    # 下（consistency A7）。不論訓練 objective 為何，evaluation 永遠是
    # per-customer mAP。
    # --------------------------------------------------------------------
  calibration:
    enabled: true
    method: sigmoid
  # --- Composite-key sample weights（模型層調權，如冷門產品 boost）---
  # sample_weight_keys: weight key 由哪些欄位組成（順序＝ "|" 串接順序），與
  #   dataset.sample_group_keys 對稱（可不同）。預設 [prod_name]＝直接對產品調權。
  #   ★每欄必須 ∈ identity(snap_date,cust_id,prod_name) ∪ {label} ∪
  #   dataset.carry_columns ∪ dataset.prepare_model_input.categorical_columns（A9a 驗）。
  #   類別欄填人類可讀字串即可（runtime encode-aware 翻 code）；機制與 edge case 見
  #   docs/pipelines/training.md。可用 scripts/sampling_overrides_editor.py 產生。
  sample_weight_keys:
    - prod_name
  # sample_weights: ★key ＝ sample_weight_keys 值用 "|" 串接、value ＝ 任意正數
  #   （>1 boost、<1 down-weight）。稀疏：只列 != 1.0 的組，其餘 = 1.0。
  #   只作用於 train/train_dev（val/calibration/evaluation 不加權）。打錯/不存在的值
  #   → 不中（weight 1.0），記入 manifest.json 的 sample_weight.unmatched_keys。
  #   A9b 驗 key 段數、A9c 驗 product 分量；改 keys 或此表 bust model_version、
  #   不動 train_variant_id。
  #   範例（sample_weight_keys: [cust_segment_typ, prod_name]）：
  #     "mass|ccard_ins": 2.0
  #     "affluent|fund_mix": 0.7
  sample_weights: {}
  # HPO scoring objective (switchable). Routed by tune_hyperparameters via
  # _hpo_score; independent of algorithm_params.objective (the LightGBM
  # learning objective).
  #   mean_ap            — per-(snap_date,cust_id) query mAP, query-equal-weight
  #                        (frequent products dominate via positive frequency).
  #   macro_per_item_map — evaluation's macro_avg.by_item.map_attr@all: per-item
  #                        attributed mAP, macro-averaged over products
  #                        (every product equal weight; cold products count).
  # NOTE: this key is inside the model_version-hashed training: block, so
  # changing it is a deliberate one-time model_version bump.
  hpo_objective: macro_per_item_map
  n_trials: 20
  num_iterations: 500
  early_stopping_rounds: 50
  # HPO 之後最終模型的處理策略：
  #   hpo_best       — 直接沿用 HPO best-trial 的 adapter（預設）。
  #   refit_on_full  — 在 train + train_dev concat 後重訓，
  #                    num_iterations = best_iteration、不做 early stopping。
  final_model_strategy: hpo_best
  # --- Training-stage feature selection（不重建 dataset、retrain 時排除多餘特徵）---
  #   ★exclude — 要丟掉的 feature 名稱 list（須 ∈ 該 dataset 的 feature_columns；
  #              不可含 schema.item，A14 fail-loud 擋下）。空/省略＝完全不啟用。
  #   啟用只 bump model_version（不動 base/train_variant），完整清單寫進 manifest.json；
  #   機制（select_features / preprocessor_view / inference 對齊 / .bin 快取）見
  #   docs/pipelines/training.md。
  feature_selection:
    exclude: []
  # search_space：ParamSpec map 的有序 list（declarative HPO, Phase 2）。
  # `name` 同時是 Optuna suggest name 與 LightGBM param key。
  # type ∈ {int, float, categorical}。int/float：low、high（可選 step、log）；
  # categorical：choices。`when` / expression bounds 屬於 Phase 3，現階段傳入
  # 會被 consistency A8 fail-loud 擋下。NOTE：從舊 dict 形式遷移過來會重排
  # 被 hash 的 `training:` 區塊——這是經過決定、接受的一次性 model_version
  # bump（見 versioning.py）。
  search_space:
    - name: learning_rate
      type: float
      low: 0.001
      high: 0.1
      log: true
    - name: num_leaves
      type: int
      low: 4
      high: 64
    - name: max_depth
      type: int
      low: 3
      high: 8
    - name: min_child_samples
      type: int
      low: 5
      high: 100
    - name: subsample
      type: float
      low: 0.6
      high: 1.0
    - name: colsample_bytree
      type: float
      low: 0.6
      high: 1.0

mlflow:
  experiment_name: recsys_tfb
  tracking_uri: "${env.MLFLOW_TRACKING_URI|mlruns}"
  # log_experiment 是 best-effort sink：tracking server 不可用或版本不相容
  # （如 client 3.x 對舊 server 呼叫 /api/2.0/mlflow/logged-models 收到 404）時，
  # 預設記 warning 後讓 training 跑完。設 true 則 MLflow 失敗即中斷（CI/嚴格環境用）。
  strict: false

# Driver-local parquet cache：materialize 後的 model inputs，重跑時可跳過 Hive
# scan。由 base_dataset_version / train_variant_id / calibration_variant_id 三
# 層 key 決定。`cache.root` 是 cache 路徑的唯一真實來源，_resolve_cache_path()
# （存在性檢查）與 _populate_cache_from_hive()（hadoop fs copyToLocal 目的地）
# 都從這裡讀。persistence 由 training/nodes.py::_materialize_parquet_handle
# 負責，不經 catalog dataset。所有環境都會寫 parquet 到 disk 並在 DAG 中以
# ParquetHandle 串接；dev/test 用一個臨時的 cache.root。
cache:
  root: data/recsys_cache

# 訓練診斷產物（特徵統計 / 原生 importance / SHAP）。
# 刻意放 top-level（與 mlflow / cache 同層）：compute_model_version 只雜湊
# training: block，故此 block 不影響 model_version（見 test_versioning）。
diagnostics:
  feature_stats:
    enabled: true
    sample_rows: 500000
    high_null_threshold: 0.5
  feature_importance:
    enabled: true
  shap:
    enabled: true
    sample_rows: 2000
    top_k: 30
    n_examples: 5
    min_rows_per_item: 30
    max_budget: 4000000   # sample_rows * n_trees 超過則自動降抽樣

# HPO 崩潰復原開關（ops 旗標，刻意放頂層不影響 model_version）。
# true（預設）：tune_hyperparameters 持久化 Optuna study + 每次刷新最佳 checkpoint
# 模型到 data/models/_hpo/<search_id>/，crash 後重跑只補跑剩餘 trial。
# false：退回純記憶體、不落地（debug 用）。詳見 docs/operations/hpo-resume.md。
hpo_checkpointing: true
