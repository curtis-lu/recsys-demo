spark:
  app_name: recsys_tfb-training
  # spark.executor.memory: 16g
  # spark.executor.cores: 4
  # spark.driver.memory: 8g

training:
  algorithm: lightgbm
  algorithm_params:
    objective: binary
    metric: binary_logloss
    verbosity: -1
    # log_period: 0 = silent (default). Set to N > 0 to print val metric every
    # N boosting rounds during training (per-trial during HPO + final refit).
    # Popped by LightGBMAdapter before lgb.train; not a native LGB param.
    log_period: 0
  calibration:
    enabled: true
    method: sigmoid
  n_trials: 20
  num_iterations: 500
  early_stopping_rounds: 50
  # Final-model strategy after HPO:
  #   hpo_best       — pass the HPO best-trial adapter through unchanged (default).
  #   refit_on_full  — retrain on train + train_dev concatenated, with
  #                    num_iterations = best_iteration and no early stopping.
  final_model_strategy: hpo_best
  search_space:
    learning_rate:
      low: 0.001
      high: 0.1
    num_leaves:
      low: 4
      high: 64
    max_depth:
      low: 3
      high: 8
    min_child_samples:
      low: 5
      high: 100
    subsample:
      low: 0.6
      high: 1.0
    colsample_bytree:
      low: 0.6
      high: 1.0

mlflow:
  experiment_name: recsys_tfb
  tracking_uri: mlruns

# Driver-local parquet cache for materialized model inputs (skips Hive scans on
# re-runs). Keyed by base_dataset_version / train_variant_id / calibration_variant_id.
# `cache.root` is the single source of truth for the cache path: both
# _resolve_cache_path() (existence check) and _populate_cache_from_hive()
# (hadoop fs copyToLocal destination) read from here. Persistence is owned by
# training/nodes.py::_materialize_parquet_handle, not by catalog datasets.
# All environments write parquet to disk and pass ParquetHandle through the
# DAG; dev/test use a tmp cache.root.
cache:
  root: /Users/curtislu/projects/recsys_tfb/data/recsys_cache
