project_name: recsys_tfb
random_seed: 42
backend: pandas

spark:
  app_name: recsys_tfb
  spark.master: yarn
  spark.driver.host: ${env.NODE_IP}
  spark.driver.port: ${vdclient.cdp.driver_port}
  spark.blockManager.port: ${vdclient.cdp.blockManager_port}
  spark.serializer: org.apache.spark.serializer.KryoSerializer
  spark.sql.session.timeZone: Asia/Taipei
  spark.sql.catalogImplementation: hive
  spark.executor.memory: 4g
  spark.executor.cores: 2

# [SCHEMA SPECIFICATION]
# All input tables (feature, label, sample_pool) provided to the dataset pipeline
# MUST adhere to the following column naming convention for core identity fields.
schema:
  columns:
    time: snap_date # Date for partitioning and point-in-time joins
    entity: [cust_id] # List of primary entity keys
    item: prod_name # Primary item identifier
    label: label
    score: score
    rank: rank
  # Explicit category declarations for identity categorical columns whose
  # distinct values cannot be discovered from feature_table (e.g. prod_name).
  # Changing this list busts base_dataset_version.
  categorical_values:
    prod_name:
      - ccard_bill
      - ccard_cash
      - ccard_ins
      - exchange_fx
      - exchange_usd
      - fund_bond
      - fund_mix
      - fund_stock

logging:
  level: INFO
  console: true
  file:
    enabled: true
    path: logs/
    format: json
