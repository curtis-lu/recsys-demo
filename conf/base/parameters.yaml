project_name: recsys_tfb
random_seed: 42

hive:
  db: ml_recsys

# 下方註解掉的 keys 是生產 CDP/YARN profile 範本。${vdclient.*} placeholder
# 由 resolve_vdclient_placeholders 解析（找不到對應 cluster 時自動 drop），
# ${env.*} 由 ConfigLoader 解析。實際生效值來自 SPARK_CONF_DIR 指向的
# spark-defaults.conf。
spark:
  app_name: recsys_tfb
  # spark.master: yarn
  # spark.driver.host: ${env.NODE_IP|}
  # spark.driver.port: ${vdclient.cdp.driver_port}
  # spark.blockManager.port: ${vdclient.cdp.blockManager_port}
  # spark.serializer: org.apache.spark.serializer.KryoSerializer
  # spark.sql.session.timeZone: Asia/Taipei
  # spark.sql.catalogImplementation: hive
  # spark.executor.memory: 4g
  # spark.executor.cores: 2
  #
  # --- 大規模（~10M entity）記憶體調參 ---
  # dataset pipeline 的 peak memory 取決於「單一 shuffle partition 大小」與 join
  # shuffle 量，而非框出幾個月（pipeline 已依 snap_date 物理分區，詳見
  # docs/pipelines/dataset.md §規模與記憶體）。主要旋鈕：
  #   shuffle.partitions 目標每分區 ~128–256MB → partitions ≈ shuffle_input_bytes / 128MB
  #   AQE（Spark 3.3 預設 on）勿關
  # dev/測試資料小用預設即可；生產取消下面兩行註解並依實測量調整：
  # spark.sql.shuffle.partitions: 400
  # spark.sql.adaptive.enabled: true

# [Schema 規範] role（左側固定）：time / entity / item / label / score / rank。
# ★右側欄名由你對應到自己的資料（換應用＝改這裡 + 來源 SQL）；抽象設計見
# docs/design-principles.md §1。進入 dataset pipeline 的所有輸入表
# （feature / label / sample_pool）核心 identity 欄位「必須」遵守此命名。
schema:
  columns:
    time: snap_date # ★切 partition / point-in-time join 用的日期欄
    entity: [cust_id] # ★主要 entity key（list 形式）
    item: prod_name # ★主要 item identifier
    label: label # ★
    score: score # 模型分數輸出欄（一般不需改）
    rank: rank # 組內名次欄（一般不需改）
  # ★Identity categorical 欄位的顯式值列舉（如 prod_name）：這些欄的 distinct 值
  # 無法從 feature_table 推得、必須在此宣告（為什麼見 design-principles §1）。
  # ⚠改動此 list 會使 base_dataset_version 失效（重新版本化、整批重算）。
  categorical_values:
    prod_name:
      - ccard_bill
      - ccard_cash
      - ccard_ins
      - exchange_fx
      - exchange_usd
      - fund_bond
      - fund_mix
      - fund_stock

logging:
  level: INFO          # ∈ {DEBUG, INFO, WARNING, ERROR, CRITICAL}（大小寫不拘；無法解析則 fallback INFO）
  console: true        # bool；console 一律 human-readable ConsoleFormatter
  file:
    enabled: true      # bool
    path: logs/        # 根目錄；實際落 <path>/<pipeline>/<YYYY-MM>/<pipeline>_<run_id>.jsonl
    format: json       # ⚠ 目前未被 setup_logging 讀取——file 一律 JSON lines；改此值無效
